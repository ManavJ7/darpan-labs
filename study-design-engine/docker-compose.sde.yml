version: "3.8"
services:
  sde-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: darpan
      POSTGRES_DB: study_design_engine
    ports:
      - "5433:5432"
    volumes:
      - sde_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sde-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  sde-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:darpan@sde-db:5432/study_design_engine
      - REDIS_URL=redis://sde-redis:6379/0
      - DEBUG=true
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      sde-db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  sde_postgres_data:
